# CI ligero: corre en cada push/PR. Bloquea merges que rompan el typecheck o el
# build del frontend. No buildea Tauri (eso es lento y se hace en release.yml).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  backend:
    name: Backend (import + syntax check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Import smoke test
        run: |
          python -c "from backend.main import app; print('routes:', len(app.routes))"
          python -c "from backend.core.docker import DockerManager; from backend.core.system import SystemMonitor; from backend.core.keys import generate_ed25519; print('OK')"

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: sshpanel:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
