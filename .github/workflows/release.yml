# Release workflow: dispara al pushear un tag `v*` (ej. `git tag v0.2.0 && git push --tags`).
# Buildea el desktop bundle en los 3 OSs vía `sshpanel app-build` (que empaqueta el
# sidecar de Python con PyInstaller y después corre `tauri build`) y publica todo
# en una GitHub Release.
#
# En paralelo buildea y publica la imagen Docker multi-arch en GHCR (ghcr.io).
#
# Requisitos:
#  - El tag debe matchear `v*.*.*` para semver.
#  - El repo necesita "Workflow permissions: read and write" para que crear el release funcione.

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # crear releases + subir assets
  packages: write   # publicar en ghcr.io

jobs:
  # 1) Buildea el desktop bundle por OS y guarda artifacts.
  desktop:
    name: Desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_glob: |
              web/src-tauri/target/release/bundle/appimage/*.AppImage
              web/src-tauri/target/release/bundle/appimage/*.AppImage.sig
              web/src-tauri/target/release/bundle/deb/*.deb
          - os: macos-latest
            artifact_glob: |
              web/src-tauri/target/release/bundle/dmg/*.dmg
              web/src-tauri/target/release/bundle/macos/*.app.tar.gz
              web/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          - os: windows-latest
            artifact_glob: |
              web/src-tauri/target/release/bundle/msi/*.msi
              web/src-tauri/target/release/bundle/msi/*.msi.sig
              web/src-tauri/target/release/bundle/nsis/*.exe
              web/src-tauri/target/release/bundle/nsis/*.exe.sig
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm i -g pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: web/src-tauri

      - name: Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget \
            file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Python project (CLI + backend)
        run: |
          pip install -r requirements.txt
          pip install -e .
          pip install pyinstaller

      - name: Install web deps
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build bundle (signed if secrets present)
        # Si los secrets están seteados, Tauri firma automáticamente los bundles
        # y emite el .sig + actualiza el latest.json. Si NO están, hace build
        # normal sin firmar — útil para forks o testing.
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: sshpanel app-build
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn

  # 2) Buildea + publica la imagen Docker multi-arch (amd64 + arm64) en GHCR.
  docker:
    name: Docker image (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute lowercase image name
        # GHCR rechaza nombres con mayúsculas. github.repository_owner mantiene
        # el casing original del user, así que lo normalizamos acá.
        id: img
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/$OWNER/sshpanel" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        env:
          # No subir el artifact ".dockerbuild" (build record): no lo usamos y
          # su descarga rompía el job release (download-artifact bajaba todo).
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3) Junta los artifacts de los 3 OSs en una sola Release.
  release:
    name: GitHub Release
    needs: [desktop, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          # Solo los bundles de desktop — sin pattern bajaba también el
          # ".dockerbuild" del job docker y su download fallaba.
          pattern: desktop-*
          path: ./artifacts

      - name: Flatten artifact dir
        run: |
          mkdir -p release-assets
          find ./artifacts -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" \
            -o -name "*.AppImage" -o -name "*.deb" -o -name "*.tar.gz" \
            -o -name "*.sig" \) \
            -exec cp {} ./release-assets/ \;
          ls -la ./release-assets

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Saca la sección entre "## [VERSION]" y la próxima "## [", si existe.
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {found=1; next}
            found && /^## \[/ {exit}
            found {print}
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No changelog entry for v$VERSION — using auto-generated notes." > release_notes.md
          fi
          echo "---"
          cat release_notes.md

      - name: Generate latest.json (updater feed)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          BASE_URL="https://github.com/$OWNER/$REPO/releases/download/${GITHUB_REF_NAME}"
          python3 <<PY
          import os, json, glob, datetime
          version = "$VERSION"
          now_utc = datetime.datetime.now(datetime.timezone.utc)
          base = "$BASE_URL"
          # Mapeo: regex de filename → key de plataforma del updater de Tauri.
          # El job de macOS corre en macos-latest (Apple Silicon), así que el
          # .app.tar.gz es aarch64 — NO mapearlo a darwin-x86_64: un Mac Intel
          # descargaría un binario que no puede ejecutar. Si algún día se
          # buildea universal o se agrega un runner Intel, sumar la entrada
          # darwin-x86_64 con su propio artifact.
          rules = [
              (r".*\.app\.tar\.gz$",                 "darwin-aarch64"),
              (r".*\.AppImage$",                     "linux-x86_64"),
              (r".*-setup\.exe$",                    "windows-x86_64"),
              (r".*\.msi$",                          "windows-x86_64"),
          ]
          import re
          platforms = {}
          for path in sorted(glob.glob("release-assets/*")):
              name = os.path.basename(path)
              if name.endswith(".sig"):
                  continue
              for pat, key in rules:
                  if re.match(pat, name):
                      sig_path = path + ".sig"
                      if not os.path.exists(sig_path):
                          continue
                      with open(sig_path) as f:
                          sig = f.read().strip()
                      # No pisamos si una plataforma ya tiene asset (preferimos el primero del orden)
                      if key in platforms:
                          continue
                      platforms[key] = {
                          "signature": sig,
                          "url": f"{base}/{name}",
                      }
                      break
          # Sin firmas (.sig) no hay plataformas → un latest.json vacío hace
          # que el updater de las apps instaladas tire error al arrancar.
          # Mejor no publicarlo: el cliente trata el feed ausente como
          # "sin updates".
          if not platforms:
              print("::warning::No signed bundles found (.sig) - skipping "
                    "latest.json. Set TAURI_SIGNING_PRIVATE_KEY + "
                    "TAURI_SIGNING_PRIVATE_KEY_PASSWORD secrets to enable "
                    "auto-update.")
              raise SystemExit(0)
          notes = ""
          if os.path.exists("release_notes.md"):
              notes = open("release_notes.md").read()
          feed = {
              "version": version,
              "notes": notes.strip(),
              "pub_date": now_utc.strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": platforms,
          }
          with open("release-assets/latest.json", "w") as f:
              json.dump(feed, f, indent=2)
          print(json.dumps(feed, indent=2))
          PY

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
